<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos do casal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<style>
    body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

    /* Header */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background-color: #b4c0c4;
        color: rgb(102, 37, 37);
        border-radius: 10px;
        width: 100%;
    }

    /* Nome do site e emoji */
    .logo h1 {
        display: flex;
        align-items: center;
        font-size: 1.5rem;
        margin: 0;
    }

    .logo span {
        margin-left: 10px;
        /* Espaçamento entre o nome e o emoji */
    }

    /* Menu de navegação */
    .menu {
        display: flex;
        justify-content: flex-end;
        /* Alinha os botões à direita */
        align-items: center;
    }

    /* Estilos para o botão */
    .menu .button {
        text-decoration: none;
        color: white;
        background-color: #1f8181;
        padding: 10px 20px;
        margin-left: 15px;
        border-radius: 5px;
        font-size: 16px;
        transition: background-color 0.3s;
    }

    /* Responsividade para telas menores */
    @media (max-width: 768px) {
        .header {
            flex-direction: row;
            /* Mantém os elementos em linha para telas pequenas */
            justify-content: space-between;
        }

        .logo h1 {
            font-size: 1.2rem;
        }

        .menu {
            margin-top: 10px;
        }

        .menu .button {
            margin-left: 10px;
        }

        /* Jogo dado */
        body {
    font-family: Arial, sans-serif;
}

.dado::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(to bottom, #ff7e5f, #feb47b);
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

.dado-container {
    perspective: 800px;
    display: inline-block;
    margin: 10px;
}

.dado {
    width: 100px;
    height: 100px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(0deg) rotateY(0deg);
}

.face {
    position: absolute;
    width: 100px;
    height: 100px;
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
}

.face-1 { transform: rotateY(0deg) translateZ(50px); }
.face-2 { transform: rotateY(90deg) translateZ(50px); }
.face-3 { transform: rotateY(180deg) translateZ(50px); }
.face-4 { transform: rotateY(-90deg) translateZ(50px); }
.face-5 { transform: rotateX(90deg) translateZ(50px); }
.face-6 { transform: rotateX(-90deg) translateZ(50px); }

.botaoJogo {
    margin-top: 10px;
    padding: 10px;
    background-color: #008CBA;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.botaoJogo:hover {
    background-color: #007B9E;
}

.containerCronometro {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    margin: 20px;
    padding: 20px;
    background-color: #f8f9fa;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    max-width: 400px;
    margin: auto;
}

#cronometro {
    display: none; /* Esconde o cronômetro inicialmente */
    text-align: center;
    align-items: center;
    margin-top: 20px;
}

button {
    cursor: pointer;
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    background-color: #008CBA;
    color: white;
    transition: background-color 0.3s;
}

button:hover {
    background-color: #007B9E;
}

#tempoMinutos, #tempoSegundos {
    width: 80px;
    margin: 5px;
    padding: 5px;
    font-size: 16px;
    text-align: center;
    border: 1px solid #ccc;
    border-radius: 5px;
}


    }
</style>

<body>

    <header class="header">
        <!-- Nome do site e emoji -->
        <div class="logo">
            <h1>Jogos do casal <span>😈</span></h1>
        </div>

        <!-- Botões -->
        <div class="menu">
            <a href="index.html" class="button">Voltar</a>
        </div>
    </header>

    <br>
    <h2>Jogo dos Dados</h2>
    <button id="botaoJogar" onclick="mostrarJogoDados()">Iniciar Jogo</button>
    <button id="botaoEsconder" style="display: none;" onclick="esconderJogoDados()">Esconder Jogo</button>
    
    <div class="jogoDados" id="jogoDados" style="display: none;">
        <!-- Dado Parte -->
        <div class="dado-container">
            <div class="dado" id="dadoParte">
                <div class="face face-1">boca</div>
                <div class="face face-2">pescoço</div>
                <div class="face face-3">escolha</div>
                <div class="face face-4">mão</div>
                <div class="face face-5">peito</div>
                <div class="face face-6">orelha</div>
            </div>
            <button class="botaoJogo" onclick="rolarDado('dadoParte')">Parte</button>
        </div>
    
        <!-- Dado Ação -->
        <div class="dado-container">
            <div class="dado" id="dadoAcao">
                <div class="face face-1">beijar</div>
                <div class="face face-2">lamber</div>
                <div class="face face-3">chupar</div>
                <div class="face face-4">tocar</div>
                <div class="face face-5">gelo</div>
                <div class="face face-6">escolha</div>
            </div>
            <button class="botaoJogo" onclick="rolarDado('dadoAcao')">Ação</button>
        </div>
    
        <!-- Dado Tempo -->
        <div class="dado-container">
            <div class="dado" id="dadoTempo">
                <div class="face face-1">30 segundos</div>
                <div class="face face-2">2 minutos</div>
                <div class="face face-3">1 minuto</div>
                <div class="face face-4">45 segundos</div>
                <div class="face face-5">5 minutos</div>
                <div class="face face-6">10 minutos</div>
            </div>
            <button class="botaoJogo" onclick="rolarDado('dadoTempo')">Tempo</button>
        </div>
    </div>
    

    <h2>Jogo da Verdade ou Desafio</h2>
    <button id="botaoIniciar" onclick="mostrarVerdadeOuDesafio()">Iniciar Jogo</button>
    <div id="verdadeDesafioContainer" style="display: none;">
        <div class="dado-container">
            <button onclick="escolherVerdadeOuDesafio()">Verdade ou Desafio</button>
            <p id="resultadoEscolha"></p>
        </div>
        <div id="tarefaContainer" style="display: none;">
            <p id="tarefaTexto"></p>
            <button onclick="proximaRodada()">Próxima Rodada</button>
        </div>
        <button id="botaoEsconder" onclick="esconderVerdadeOuDesafio()">Esconder Jogo</button>
    </div>

    <h2>Jogo de tabuleiro</h2>
    <button id="iniciarJogoBtn" onclick="iniciarJogo()">Iniciar Jogo</button>
    <button id="esconderJogoBtn" onclick="esconderJogo()" style="display: none;">Esconder Jogo</button>
    <div class="controles" style="display: none;">
        <button onclick="rolarDado()">Rolar Dado</button>
        <div id="resultadoDado"></div>
        <div id="statusJogador">Vez do Jogador 1</div>
        <div id="acoes" style="display: none;">
            <button id="fazer" onclick="fazerAcao()">Fazer</button>
            <button id="desistir" onclick="desistirAcao()">Desistir</button>
        </div>
        <div id="cartaAcao" style="display: none;">
            <div id="textoCarta"></div>
            <button onclick="fecharCarta()">Fechar</button>
        </div>
    </div>
    <div id="tabuleiro" style="display: none;"></div>

    <h2>Cronômetro</h2>
    <div class="containerCronometro">
        <button id="mostrarCronometroBtn">Mostrar Cronômetro</button>
        <div id="cronometro">
            <h2>Cronômetro</h2>
            <label for="tempoMinutos">Minutos:</label>
            <input type="number" id="tempoMinutos" placeholder="Minutos">
            <label for="tempoSegundos">Segundos:</label>
            <input type="number" id="tempoSegundos" placeholder="Segundos">
            <button id="iniciarCronometroBtn">Iniciar</button>
            <p id="tempoRestante">Tempo restante: 0</p>
        </div>
    </div>
    </div>

    <script src="js/dados.js"></script>
    <script src="js/VD.js"></script>
    <script src="js/tabuleiro.js"></script>
    <script src="js/cronometro.js"></script>
</body>

</html>
